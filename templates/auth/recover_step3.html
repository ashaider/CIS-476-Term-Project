{% extends "base.html" %}
{% block title %}DriveShare | Reset Password{% endblock %}
{% block content %}
<div class="form-page">
  <div class="form-card">
    <h2>Set New Password</h2>
    <p class="form-sub">Step 3 of 3 - Choose a new password.</p>
    <form method="POST">
      <div class="form-group">
        <label>New Password</label>
        <input type="password" name="password" required placeholder="Min. 6 characters" autofocus />
      </div>
      <div class="form-group">
        <label>Confirm New Password</label>
        <input type="password" name="confirm_password" required placeholder="Repeat password" />
      </div>
      <button type="submit" class="btn btn-primary btn-block">Reset Password</button>
    </form>
  </div>
</div>
{% endblock %}
