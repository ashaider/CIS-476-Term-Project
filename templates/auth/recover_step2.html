{% extends "base.html" %}
{% block title %}DriveShare | Security Questions{% endblock %}
{% block content %}
<div class="form-page">
  <div class="form-card">
    <h2>Security Questions</h2>
    <p class="form-sub">Step 2 of 3 - Answer all three questions correctly.</p>
    <form method="POST">
      <div class="form-group">
        <label>{{ user.security_q1 }}</label>
        <input type="text" name="answer1" required placeholder="Your answer" autofocus />
      </div>
      <div class="form-group">
        <label>{{ user.security_q2 }}</label>
        <input type="text" name="answer2" required placeholder="Your answer" />
      </div>
      <div class="form-group">
        <label>{{ user.security_q3 }}</label>
        <input type="text" name="answer3" required placeholder="Your answer" />
      </div>
      <button type="submit" class="btn btn-primary btn-block">Verify Answers</button>
    </form>
  </div>
</div>
{% endblock %}
