{% extends "base.html" %}
{% block title %}DriveShare | Login{% endblock %}
{% block content %}
<div class="form-page">
  <div class="form-card">
    <h2>Welcome Back</h2>
    <p class="form-sub">Sign in to your DriveShare account.</p>
    <form method="POST">
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" required placeholder="email@example.com" autofocus />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" required placeholder="Your password" />
      </div>
      <div class="form-check">
        <input type="checkbox" name="remember" id="remember" />
        <label for="remember">Remember me</label>
      </div>
      <button type="submit" class="btn btn-primary btn-block">Sign In</button>
    </form>
    <p class="form-footer">
      <a href="{{ url_for('auth.recover_step1') }}">Forgot your password?</a>
    </p>
    <p class="form-footer">Don't have an account? <a href="{{ url_for('auth.register') }}">Register</a></p>
  </div>
</div>
{% endblock %}
